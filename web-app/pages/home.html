<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Booking Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141E30, #243B55);
        }

        .container {
            background: white;
            width: 500px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #222;
            margin-bottom: 20px;
            font-size: 32px;
        }

        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .button {
            display: inline-block;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,114,255,0.3);
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,114,255,0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚖</div>
        <h1>Welcome to Ride Booking</h1>
        <p>Fast, safe and reliable rides at your fingertips.</p>
        <a href="/book" class="button">Book a Ride</a>
    </div>
</body>
</html>
